<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Image Carousel</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: rgb(255, 255, 255);
      margin: 0;
      padding: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .box {
      width: 100%;
      height:600px;
      background-color: #3b3a92;
      border-radius: 8px;
      box-shadow: 0 0 5px rgba(247, 220, 220, 0.3);
      padding: 20px;
      text-align: center;
    }

    .img {
      width: 500px;
      height: 500px;
      border-radius: 4px;
      object-fit: cover;
      border: 1px solid #ccc;
    }

    .btn {
      padding: 8px 60px;
      margin-top: 10px;
      margin:30px;
      cursor: pointer;
      background-color: #007bff;
      color: #fff;
      border: none;
      border-radius: 4px;
      font-size: 14px;
      transition: background-color 0.3s ease;
    }

    .btn:hover {
      background-color: #0056b3;
    }

    .btn img{
        width: 40px;
        height: 40px;
    }

    @media screen and (max-width:900px)
 {   
    
    .box {
    /* display: flex; */
      width: 100%;
      height: 600px;
      background-color: #3b3a92;
      border-radius: 8px;
      box-shadow: 0 0 5px rgba(247, 220, 220, 0.3);
      /* padding: 20px; */
      padding-top: 170px;
      padding-bottom: 150px;
      margin-left: -50px;
      /* margin-right: -50px; */
      text-align: center;
      justify-content: center;
         align-items: center;

    }

    .img {
      width: 250px;
      height: 400px;
      border-radius: 4px;
      object-fit: cover;
      border: 1px solid #ccc;
      margin-bottom: 30px;
      border: none;
      padding-top: -30PX;
    }

    .btn {
      padding: 4px 20px;
      margin-top: 10px;
      margin:7px;
      cursor: pointer;
      background-color: #007bff;
      color: #fff;
      border: none;
      border-radius: 4px;
      font-size: 14px;
      transition: background-color 0.3s ease;
    }
    .button{
        justify-content: center;
         align-items: center;
        display : flex ;    
    }
    .btn img{
        width: 25px;
        height: 25px;
    }
    
 }
  </style>
</head>
<body>
  <div class="box">
    <img src="1.jpg" class="img">
    <br><div class="button">
    <button class="btn pre" onclick="previous()"><img src="previous.png" height="20px"></button>
    <button class="btn download" onclick="downloadImage()"><img src="download.png" height="20px" width="20px"></button>
    <button class="btn share" onclick="shareWebsite()"><img src="share.png" height="20px"></button>
    <button class="btn next" onclick="next()"><img src="next.png" height="20px" width="20px"></button>
    <!-- <button class="btn share" onclick="shareImage()"><img src="share.png" height="20px"></button> -->
</div>
  </div>
</body>
<script>
  let img = document.getElementsByClassName("img")[0];
  var links = ["1.jpg","2.png","3.jpg","4.png","5.jpg","6.jpg"];
  var currentIndex = 0;


  //Next Function
  function next() {
    currentIndex = (currentIndex + 1) % links.length;
    img.src = links[currentIndex];
  }


  //Previous Function
  var previousIndex = currentIndex;
  function previous() {
    previousIndex = (previousIndex - 1 + links.length) % links.length;
    img.src = links[previousIndex];
  }


//Share Image Function

function shareImage() {
    if (navigator.share) {
      // Use the Web Share API if available
      navigator.share({
        title: 'Check out this image!',
        text: 'Take a look at this beautiful image!',
        url: img.src
      })
        .then(() => console.log('Image shared successfully!'))
        .catch((error) => console.error('Error sharing image:', error));
    } else {
      // Fallback for devices/browsers that don't support Web Share API
      alert('Sharing is not supported on this device.');
    }
  }

//Share Website Function
  function shareWebsite() {
    if (navigator.share) {
      // Use the Web Share API if available
      navigator.share({
        title: 'Check out this image!',
        text: 'Take a look at this beautiful image!',
        url: window.location.href
      })
        .then(() => console.log('Image shared successfully!'))
        .catch((error) => console.error('Error sharing image:', error));
    } else {
      // Fallback for devices/browsers that don't support Web Share API
      alert('Sharing is not supported on this device.');
    }
  }


//Download Function
  const downloadButtons = document.querySelectorAll('.download');
  downloadButtons.forEach(button => {
    button.addEventListener('click', downloadImage);
  });

  function downloadImage() {
    const imageUrl = img.src;
    const link = document.createElement('a');
    link.href = imageUrl;
    link.download = 'image.jpg';
    link.click();
  }
</script>
</html>
