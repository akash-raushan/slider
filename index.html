<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Image Carousel</title>
  <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
</head>

<body class="bg-background w-screen h-screen flex justify-center items-center">
  <div class="box">
    <div class="image-container relative flex mx-auto justify-center w-full max-w-sm sm:max-w-md md:max-w-lg lg:max-w-xl h-72 sm:h-80 md:h-96 lg:h-[500px]">
      <div class="absolute inset-0 bg-[#ffffffa2] backdrop-blur-sm z-0"></div>
      <img src="asset/1.jpg" class="img w-full h-full object-contain border border-white rounded-lg z-10" alt="Image">
      <img src="asset/share (1).png" class="absolute top-2 right-2 w-8 h-8 sm:w-10 sm:h-10 md:w-12 md:h-12 lg:w-[40px] lg:h-[40px] cursor-pointer z-20" alt="Share Icon" onclick="shareImage()">
    </div>
    <br>
    <div class="button flex gap-2 sm:gap-3 justify-center">
      <button class="btn bg-[#007bff] rounded-[4px] p-2 sm:p-3 md:p-4 download" onclick="downloadImage()">
        <img src="asset/download.png" class="h-5 w-5 sm:h-6 sm:w-6 md:h-7 md:w-7" alt="Download">
      </button>
      <button class="btn bg-[#007bff] rounded-[4px] p-2 sm:p-3 md:p-4 pre" onclick="previous()">
        <img src="asset/previous.png" class="h-5 w-5 sm:h-6 sm:w-6 md:h-7 md:w-7" alt="Previous">
      </button>
      <button class="btn bg-[#007bff] rounded-[4px] p-2 sm:p-3 md:p-4 play" onclick="play()">
        <img src="asset/play.png" class="h-5 w-5 sm:h-6 sm:w-6 md:h-7 md:w-7" alt="Play">
      </button>
      <button class="btn bg-[#007bff] rounded-[4px] p-2 sm:p-3 md:p-4 next" onclick="next()">
        <img src="asset/next.png" class="h-5 w-5 sm:h-6 sm:w-6 md:h-7 md:w-7" alt="Next">
      </button>
      <button class="btn bg-[#007bff] rounded-[4px] p-2 sm:p-3 md:p-4 share" onclick="shareWebsite()">
        <img src="asset/share.png" class="h-5 w-5 sm:h-6 sm:w-6 md:h-7 md:w-7" alt="Share">
      </button>
    </div>
  </div>
</body>

<script src="script.js"></script>

</html>
